backend:
  name: git-gateway
  branch: main

# pasta default (fallback)
media_folder: "src/assets/images" # Location where files will be stored in the repo
public_folder: "src/assets/images" # The src attribute for uploaded media

# ---- ANCORAS ----
project_fields: &project_fields
  - { label: "Title", name: "title", widget: "string" }
  - { label: "Hero", name: "hero", widget: "image", required: false }

  - label: "Languages"
    name: "languages"
    widget: "object"
    fields:
      - label: "Português"
        name: "pt"
        widget: "object"
        fields:
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Tags", name: "tags", widget: "list" }
          - { label: "Body (PT)", name: "body", widget: "markdown" }

      - label: "English"
        name: "en"
        widget: "object"
        fields:
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Tags", name: "tags", widget: "list" }
          - { label: "Body (EN)", name: "body", widget: "markdown" }

  - label: "Metadata"
    name: "meta"
    widget: "object"
    fields:
      - { label: "Created At", name: "created_at", widget: "datetime" }
      - {
          label: "Updated At",
          name: "updated_at",
          widget: "datetime",
          required: false,
        }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Stage", name: "stage", widget: "string" }
      - {
          label: "Progress",
          name: "progress",
          widget: "number",
          min: 0,
          max: 100,
        }

# ---- COLEÇÕES ----
collections:
  - name: "projects"
    label: "Projects"
    folder: "/src/content/projects"
    extension: "mdx"
    format: "frontmatter"
    create: true
    # usa o título (em PT ou EN) para o slug (fallback no momento usando title)
    slug: "{{title | slugify}}"
    # pasta de mídias para cada item (sob /public/uploads)
    media_folder: "/public/uploads/projects/{{slug}}"
    public_folder: "/uploads/projects/{{slug}}"
    fields: *project_fields

  - name: "insights"
    label: "Insights"
    folder: "/src/content/insights"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{title | slugify}}"
    media_folder: "/public/uploads/insights/{{slug}}"
    public_folder: "/uploads/insights/{{slug}}"
    fields: *project_fields

  - name: "studio"
    label: "Studio"
    folder: "/src/content/studio"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{title | slugify}}"
    media_folder: "/public/uploads/studio/{{slug}}"
    public_folder: "/uploads/studio/{{slug}}"
    fields: *project_fields
