backend:
  name: git-gateway

local_backend: true
media_folder: "" # 🚨 vazio para permitir caminho relativo
public_folder: "" # 🚨 vazio para permitir caminho relativo

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    media_folder: "" # usa a mesma pasta do post
    public_folder: ""
    format: "frontmatter"
    extension: "mdx"
    editor:
      preview: true

    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descrição", name: "description", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Capa", name: "image", widget: "image" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
