backend:
  name: git-gateway
  branch: main

media_folder: ""
public_folder: ""

# ---- CRIA ÂNCORA REUTILIZÁVEL ----
# Essa âncora (&project_fields) contém o mesmo fields da coleção "projects"
project_fields: &project_fields
  - { label: "Title", name: "title", widget: "string" }
  - { label: "Hero", name: "hero", widget: "image" }
  - label: "Languages"
    name: "languages"
    widget: "object"
    fields:
      - label: "Português"
        name: "pt"
        widget: "object"
        fields:
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Tags", name: "tags", widget: "list" }
          - { label: "Body (PT)", name: "body", widget: "markdown" }

      - label: "English"
        name: "en"
        widget: "object"
        fields:
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Tags", name: "tags", widget: "list" }
          - { label: "Body (EN)", name: "body", widget: "markdown" }

  - label: "Metadata"
    name: "meta"
    widget: "object"
    fields:
      - { label: "Created At", name: "created_at", widget: "datetime" }
      - {
          label: "Updated At",
          name: "updated_at",
          widget: "datetime",
          required: false,
        }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Stage", name: "stage", widget: "string" }
      - { label: "Progress", name: "progress", widget: "number" }

# ---- COLEÇÕES ----
collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{title | slugify}}"
    fields: *project_fields

  - name: "insights"
    label: "Insights"
    folder: "src/content/insights"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{title | slugify}}"
    fields: *project_fields

  - name: "studio"
    label: "Studio"
    folder: "src/content/studio"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{title | slugify}}"
    fields: *project_fields
