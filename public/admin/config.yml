backend:
  name: git-gateway
  branch: main

# pasta default (fallback)
media_folder: "src/assets/images"
public_folder: "../../assets/images"

# ---- ÂNCORA DE FIELDS ----
project_fields: &project_fields # 🔑 slug base
  - { label: "Entry (slug base)", name: "entry", widget: "string" }

  - { label: "Hero", name: "hero", widget: "image", required: false }
  - { label: "Tags", name: "tags", widget: "list" }

  - label: "Metadata"
    name: "meta"
    widget: "object"
    fields:
      - { label: "Criado em", name: "created_at", widget: "datetime" }
      - {
          label: "Atualizado em",
          name: "updated_at",
          widget: "datetime",
          required: false,
        }
      - {
          label: "Progresso",
          name: "progress",
          widget: "number",
          min: 0,
          max: 200,
        }

  - label: "Languages"
    name: "languages"
    widget: "object"
    fields:
      - label: "Português"
        name: "pt"
        widget: "object"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Resumo", name: "summary", widget: "text" }
          - { label: "Body (PT)", name: "body", widget: "markdown" }

      - label: "English"
        name: "en"
        widget: "object"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text" }
          - { label: "Body (EN)", name: "body", widget: "markdown" }

# ---- COLEÇÕES ----
collections:
  - name: "projects"
    label: "Projects"
    folder: "/src/content/projects"
    extension: "mdx"
    format: "frontmatter"
    create: true

    # 🔥 slug definitivo
    slug: "projects/{{year}}_{{month}}_{{day}}-{{hour}}_{{minute}}_{{entry | slugify}}"

    media_folder: "/src/assets/projects/"
    public_folder: "../../assets/projects/"
    fields: *project_fields

  - name: "insights"
    label: "Insights"
    folder: "/src/content/insights"
    extension: "mdx"
    format: "frontmatter"
    create: true

    slug: "insights/{{year}}_{{month}}_{{day}}-{{hour}}_{{minute}}_{{entry | slugify}}"

    media_folder: "/src/assets/insights/"
    public_folder: "../../assets/insights/"
    fields: *project_fields

  - name: "studio"
    label: "Studio"
    folder: "/src/content/studio"
    extension: "mdx"
    format: "frontmatter"
    create: true

    slug: "studio/{{year}}_{{month}}_{{day}}-{{hour}}_{{minute}}_{{entry | slugify}}"

    media_folder: "/src/assets/studio/"
    public_folder: "../../assets/studio/"
    fields: *project_fields
