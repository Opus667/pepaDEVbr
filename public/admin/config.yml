backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    extension: "mdx"
    format: "frontmatter"
    create: true
    fields:
      - label: "Languages"
        name: "languages"
        widget: "object"
        fields:
          - label: "Português"
            name: "pt"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Summary", name: "summary", widget: "text"}
              - {label: "Hero", name: "hero", widget: "image"}
              - {label: "Tags", name: "tags", widget: "list"}
              - {label: "Body (PT)", name: "body", widget: "markdown"}

          - label: "English"
            name: "en"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Summary", name: "summary", widget: "text"}
              - {label: "Hero", name: "hero", widget: "image"}
              - {label: "Tags", name: "tags", widget: "list"}
              - {label: "Body (EN)", name: "body", widget: "markdown"}

      - label: "Metadata"
        name: "meta"
        widget: "object"
        fields:
          - {label: "Created At", name: "created_at", widget: "datetime"}
          - {label: "Updated At", name: "updated_at", widget: "datetime", required: false}
          - {label: "Category", name: "category", widget: "string"}
          - {label: "Stage", name: "stage", widget: "string"}
          - {label: "Progress", name: "progress", widget: "number"}

  - name: "insights"
    label: "Insights"
    folder: "src/content/insights"
    extension: "mdx"
    format: "frontmatter"
    create: true
    fields: *fields

  - name: "studio"
    label: "Studio"
    folder: "src/content/studio"
    extension: "mdx"
    format: "frontmatter"
    create: true
    fields: *fields
